# =============================================================================
# WaterPulse Canada — Nginx Reverse Proxy Configuration
# =============================================================================
#
# Routes all browser traffic through a single origin (port 80), solving the
# cross-origin cookie problem for HTTPOnly JWT authentication.
#
# Routing rules:
#   /api/*        → backend:8000   FastAPI REST endpoints
#   /docs         → backend:8000   Swagger UI (interactive API documentation)
#   /openapi.json → backend:8000   OpenAPI specification (used by Swagger)
#   /*            → frontend:3000  Next.js pages and static assets
#
# Why a reverse proxy?
#   The backend sets HTTPOnly cookies (access_token) on login responses.
#   For the browser to send these cookies back on subsequent API requests,
#   both the frontend and API must appear to be on the same origin.
#   Nginx achieves this by serving both services from localhost:80.
#
# Service names ("backend", "frontend") are resolved by Docker's internal
# DNS — they match the service names defined in docker-compose.yml.
#
# proxy_set_header directives:
#   Host              — preserves the original Host header from the browser
#   X-Real-IP         — passes the client's actual IP to the backend
#   X-Forwarded-For   — appends the client IP to the proxy chain
#   X-Forwarded-Proto — tells the backend whether the original request was
#                        HTTP or HTTPS (important for cookie Secure flag)
# =============================================================================

server {
    listen 80;
    server_name localhost;

    # ── Backend API endpoints ─────────────────────────────────────────────────
    # All REST API calls from the frontend are prefixed with /api/.
    # The trailing slash on proxy_pass is important — it means Nginx passes
    # the full /api/... path to the backend (not stripping the prefix).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Swagger UI (API documentation) ────────────────────────────────────────
    # FastAPI auto-generates interactive docs at /docs.
    # Accessible at http://localhost/docs when running via Docker.
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── OpenAPI specification ─────────────────────────────────────────────────
    # The JSON schema that powers Swagger UI. Must be proxied separately
    # because Swagger fetches it by absolute path.
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Frontend (catch-all) ──────────────────────────────────────────────────
    # Everything that doesn't match /api, /docs, or /openapi.json is routed
    # to the Next.js frontend server. This includes pages, static assets
    # (_next/static/*), and the favicon.
    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
