# =============================================================================
# CronJob — Historical Data Sync
# =============================================================================
#
# A CronJob runs a Job on a schedule — like cron on Linux or Task Scheduler
# on Windows. This is the Kubernetes-native way to handle the annual
# historical sync, replacing the APScheduler job in scheduler.py.
#
# Why a CronJob instead of running inside the API server?
#   - No health probes — the pod won't be killed for being "unresponsive"
#     during a long-running sync (the backend's liveness probe would kill it)
#   - No Ingress timeouts — talks directly to the database
#   - Dedicated resources — gets its own pod with its own CPU/memory limits,
#     so it doesn't compete with the API server
#   - Kubernetes-native scheduling — visible via `kubectl get cronjobs`,
#     shows last run time, success/failure, and next scheduled run
#
# Schedule: January 1st at 03:00 UTC — same as the APScheduler config.
# Rebuilds the percentile table with the latest 5 years of historical data
# for all of Canada.
#
# How it works:
#   1. On the schedule, Kubernetes creates a Job (which creates a pod)
#   2. The pod runs a Python script that imports sync_historical_data()
#      and calls it — same pattern as _run_historical_sync() in scheduler.py
#   3. When the sync finishes, the pod exits and the Job is marked Complete
#   4. Kubernetes keeps the last 3 successful and 1 failed Job for log
#      inspection, and automatically cleans up older ones
#
# Monitoring:
#   kubectl get cronjobs -n waterpulse              # See schedule and last run
#   kubectl get jobs -n waterpulse                   # See completed/failed Jobs
#   kubectl logs job/<job-name> -n waterpulse        # Read sync output
#
# Manual trigger (run immediately without waiting for the schedule):
#   kubectl create job --from=cronjob/historical-sync manual-sync -n waterpulse
#   kubectl logs -f job/manual-sync -n waterpulse
#   kubectl delete job manual-sync -n waterpulse     # Clean up after
# =============================================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: historical-sync
  namespace: waterpulse
spec:
  # ── Schedule ─────────────────────────────────────────────────────────────
  # Cron syntax: minute hour day-of-month month day-of-week
  # "0 3 1 1 *" = at 03:00 UTC on January 1st, every year.
  # Matches the APScheduler config: CronTrigger(month=1, day=1, hour=3, minute=0)
  schedule: "0 3 1 1 *"

  # ── Concurrency policy ──────────────────────────────────────────────────
  # "Forbid" prevents a new Job from starting if the previous one is still
  # running. Matches APScheduler's max_instances=1 — only one sync can run
  # at a time to avoid duplicate writes.
  concurrencyPolicy: Forbid

  # ── History limits ──────────────────────────────────────────────────────
  # How many completed/failed Jobs to keep for log inspection.
  # Older Jobs and their pods are automatically deleted.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      # One automatic retry is reasonable for transient network errors
      # when fetching from external APIs.
      backoffLimit: 1

      template:
        spec:
          restartPolicy: Never

          containers:
            - name: historical-sync
              image: waterpulse-backend:latest
              imagePullPolicy: IfNotPresent

              # ── Override the default entrypoint ────────────────────────────
              # Runs the sync function directly instead of starting uvicorn.
              # Same pattern as _run_historical_sync() in scheduler.py.
              command: ["python", "-c"]
              args:
                - |
                  import asyncio
                  import sys
                  import logging

                  logging.basicConfig(
                      level=logging.INFO,
                      format="%(asctime)s [%(name)s] %(levelname)s: %(message)s",
                  )
                  logger = logging.getLogger("historical-sync-job")

                  async def main():
                      from app.services.historical_sync import sync_historical_data

                      logger.info("Starting historical sync for all provinces...")
                      try:
                          result = await sync_historical_data()
                          logger.info(f"Historical sync complete — {result}")
                      except Exception as e:
                          logger.error(f"Historical sync failed — {e}", exc_info=True)
                          sys.exit(1)

                  asyncio.run(main())

              # ── Environment: ConfigMap + Secrets ───────────────────────────
              envFrom:
                - configMapRef:
                    name: waterpulse-config

              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: waterpulse-secrets
                      key: POSTGRES_PASSWORD

                - name: SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: waterpulse-secrets
                      key: SECRET_KEY

                - name: DATABASE_URL
                  value: "postgresql+asyncpg://waterpulse:$(POSTGRES_PASSWORD)@db-service:5432/waterpulse"
                - name: DATABASE_URL_SYNC
                  value: "postgresql+psycopg2://waterpulse:$(POSTGRES_PASSWORD)@db-service:5432/waterpulse"

              # ── Resource limits ────────────────────────────────────────────
              # More memory than the API server — the sync processes hundreds
              # of CSV files and builds large batch inserts.
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
